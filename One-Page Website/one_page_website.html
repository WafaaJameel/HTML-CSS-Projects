<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wafaa Jameel | Portfolio</title>
    <style>
        /* Basic Styling and Color Palette */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: #f4f7f6;
        }

        /* Navigation */
        nav {
            background-color: #2c3e50;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Sections */
        section {
            padding: 60px 20px;
            max-width: 900px;
            margin: auto;
        }

        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #1abc9c;
            padding-bottom: 10px;
        }

        .hero {
            text-align: center;
            background: white;
            padding: 100px 20px;
            margin-bottom: 20px;
        }

        /* Image Gallery */
        .gallery {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .gallery img {
            width: 250px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Video Container */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            margin-top: 20px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        /* Form Styling */
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        label { display: block; margin-top: 10px; font-weight: bold; }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #1abc9c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
        }

        button:hover { background-color: #16a085; }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#videos">Videos</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="home" class="hero">
        <h1>Welcome, I'm Wafaa Jameel</h1>
        <p>I am a student passionate about web development, creative design, and technology. This page showcases my journey and the projects I'm working on.</p>
    </section>

    <section id="gallery">
        <h2>My Work & Inspiration</h2>
        <div class="gallery">
            <img src="https://cdn.pixabay.com/photo/2023/06/01/06/01/ocean-8032724_1280.jpg" alt="Sample Project 1">
            <img src="https://cdn.pixabay.com/photo/2023/06/01/06/01/ocean-8032724_1280.jpg" alt="Sample Project 1">
            <img src="https://cdn.pixabay.com/photo/2023/06/01/06/01/ocean-8032724_1280.jpg" alt="Sample Project 1">
        </div>
    </section>

    <section id="videos">
        <h2>Featured Video</h2>
        <div class="video-container">
<iframe width="560" height="315" src="https://www.youtube.com/embed/rYEDA3JcQqw?si=EqCEdKXYK7hZPpqE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>        </div>
    </section>

    <section id="contact">
        <h2>Get In Touch</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>

            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Wafaa Jameel | Built for Learning</p>
    </footer>

</body>
</html>
